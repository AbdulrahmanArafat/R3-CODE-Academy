<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <title>R3 CODE Academy</title>
</head>

<body>

    <header>

        <div class="one">
            <img src="../images/logo.png" alt="logo" class="logo">
            <p>R3 CODE Academy</p>
        </div>

        <nav>

            <div id="menu">

                <button id="menuButton" class="menu">
                    <i class="fa-solid fa-bars nav-toggle-icon" aria-hidden="true"></i>
                </button>

                <div id="menuLinks">

                    <a href="../index.html" class="borderAccount nav-link">Home</a>
                    <a href="courses.html" class="borderAccount nav-link">Courses</a>
                    <a href="books.html" class="borderAccount nav-link">Books</a>
                    <a href="contact.html" class="nav-link">Contact</a>

                </div>

            </div>

            <div class="account">

                <button class="account-btn">Account</button>

                <div class="dropdown">

                    <a href="login.html" class="borderAccount account-link is-active">Log in</a>
                    <a href="signup.html" class="account-link">Sign up</a>

                </div>

            </div>

        </nav>

    </header>

    <section class="auth-page">
        <form action="#" class="loginF">
            <p>login</p>
            <input type="Email" placeholder="Email" required>

            <div class="passwords">
                <input type="password" placeholder="Password" required maxlength="12">
                <i class="fa-regular fa-eye password-toggle-icon" aria-hidden="true"></i>
            </div>
            <a href="../index.html" class="btn">Log in</a>
            <a href="signup.html" class="btn secondary-action lastbtn">Create Account</a>
            <a href="resetPassword.html" id="forget">Forgot your password?</a>

        </form>
    </section>

    <script src="../JavaScript/main.js"></script>

</body>

</html>
