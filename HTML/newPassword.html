<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <title>R3 CODE Academy</title>
</head>

<body>

    <header>

        <div class="one">
            <img src="/images/logo.png" alt="logo" class="logo">
            <p>R3 CODE Academy</p>
        </div>

        <nav>

            <div id="menu">

                <button id="menuButton" class="menu">

                    <span class="material-symbols-outlined" style="font-size: 60px;">
                        menu
                    </span>

                </button>

                <div id="menuLinks">

                    <a href="index.html" class="borderAccount">Home</a>
                    <a href="#" class="borderAccount">Courses</a>
                    <a href="#" class="borderAccount">Tasks</a>
                    <a href="#" class="borderAccount">Books</a>
                    <a href="#">contact</a>

                </div>

            </div>

            <div class="account">

                <button class="account-btn">Account</button>

                <div class="dropdown">

                    <a href="login.html" class="borderAccount">Log in</a>
                    <a href="signup.html">Sign up</a>

                </div>

            </div>

        </nav>

    </header>

    <section>
        <form action="#" class="newPassword">
            <p>Reset passwowd</p>
            <h3>Enter your new password.</h3>

            <div class="passwords">
                <input type="password" placeholder="New password" required maxlength="12">
                <span class="material-symbols-outlined">
                    visibility
                </span>
            </div>

            <div class="passwords">
                <input type="password" placeholder="Confirm password" required maxlength="12">
                <span class="material-symbols-outlined">
                    visibility
                </span>
            </div>

            <a href="login.html" class="btn">Next</a>

        </form>
    </section>

    <script src="/JavaScript/main.js"></script>

</body>

</html>
